# Manual npm publish on branch main. Repo secret: NPM_TOKEN (npm automation token, publish).
name: Publish

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump (npm version)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Verify (lint, test, build)
        run: npm run release:verify

      - name: Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::Repository secret NPM_TOKEN is not set. Add an npm automation token under Settings → Secrets."
            exit 1
          fi

      - name: Bump version
        run: npm version ${{ github.event.inputs.bump }} -m "chore(release): %s"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Push version commit and tags
        run: |
          git push origin HEAD:main
          git push origin --tags
